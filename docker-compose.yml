version: '3.8'

services:
  # Frontend React Widget
  widget:
    build:
      context: .
      dockerfile: Dockerfile.widget
    container_name: widget-frontend
    ports:
      - '3000:80'
    environment:
      - NODE_ENV=production
    networks:
      - widget-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Future Python Backend Services
  # Uncomment and configure when backend services are added

  # directory-service:
  #   build:
  #     context: ./apps/directory
  #     dockerfile: Dockerfile
  #   container_name: directory-backend
  #   ports:
  #     - "8001:8000"
  #   environment:
  #     - PYTHONPATH=/app
  #     - ENVIRONMENT=production
  #   networks:
  #     - widget-network
  #   restart: unless-stopped
  #   depends_on:
  #     - postgres
  #     - redis

  # matching-service:
  #   build:
  #     context: ./apps/matching
  #     dockerfile: Dockerfile
  #   container_name: matching-backend
  #   ports:
  #     - "8002:8000"
  #   environment:
  #     - PYTHONPATH=/app
  #     - ENVIRONMENT=production
  #   networks:
  #     - widget-network
  #   restart: unless-stopped
  #   depends_on:
  #     - postgres
  #     - redis

  # Database (for future backend services)
  postgres:
    image: postgres:15-alpine
    container_name: widget-postgres
    environment:
      POSTGRES_DB: widget_db
      POSTGRES_USER: widget_user
      POSTGRES_PASSWORD: widget_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - '5432:5432'
    networks:
      - widget-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U widget_user -d widget_db']
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (for caching and sessions)
  redis:
    image: redis:7-alpine
    container_name: widget-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - widget-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (for production)
  nginx-proxy:
    image: nginx:alpine
    container_name: widget-nginx-proxy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - widget
      # - directory-service
      # - matching-service
    networks:
      - widget-network
    restart: unless-stopped

networks:
  widget-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
